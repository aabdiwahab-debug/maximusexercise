<style>
  :root {
    --bg: #f0f2f5;
    --white: #ffffff;
    --red: #e02020;
    --red-light: rgba(224, 32, 32, 0.08);
    --text: #1a1a1a;
    --muted: #888899;
    --border: rgba(0,0,0,0.07);
    --glass: rgba(255,255,255,0.85);
    --shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(224,32,32,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(224,32,32,0.03) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* ── HEADER ── */
  header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; color: var(--muted);
    transition: all 0.2s;
    text-decoration: none;
  }
  .back-btn:hover { border-color: var(--red); color: var(--red); }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px; color: var(--text);
  }
  .workout-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-top: 2px;
  }
  .clear-btn {
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; color: var(--muted);
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  /* ── MAIN ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
  }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.3; }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px;
  }
  .empty-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-bottom: 28px;
  }
  .go-back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red); color: #fff;
    border: none; border-radius: 12px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    transition: all 0.2s;
  }
  .go-back-btn:hover { background: #c01818; transform: translateY(-2px); }

  /* ── EXERCISE GRID ── */
  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .ex-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: var(--shadow);
    position: relative;
  }
  .ex-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 16px 48px rgba(0,0,0,0.14);
    border-color: rgba(224,32,32,0.2);
  }
  .ex-video {
    width: 100%; aspect-ratio: 16/9;
    background: #f0f0f0; overflow: hidden;
    position: relative;
  }
  .ex-video video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ex-info { padding: 12px 14px; }
  .ex-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    margin-bottom: 6px; line-height: 1.4;
  }
  .ex-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--red); background: var(--red-light);
    padding: 3px 8px; border-radius: 6px;
  }
  .ex-num {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.5); color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .remove-btn {
    width: calc(100% - 24px);
    margin: 0 12px 12px;
    padding: 8px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    transition: all 0.15s;
    display: block;
  }
  .remove-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    z-index: 1000; display: none;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-wrap { position: relative; max-width: 680px; width: 100%; max-height: 90vh; }
  .modal { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.25); animation: modalIn 0.25s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .modal-video {
    width: 100%; aspect-ratio: 16/9; background: #f0f0f0;
    max-height: 60vh; overflow: hidden;
  }
  .modal-video video { width: 100%; height: 100%; object-fit: contain; background: #fff; display: block; max-height: 60vh; }
  .modal-body { padding: 20px 24px 24px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px; margin-bottom: 8px;
  }
  .modal-close {
    position: absolute; top: -12px; right: -12px;
    width: 36px; height: 36px;
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted);
    transition: all 0.2s; z-index: 10;
  }
  .modal-close:hover { color: var(--red); border-color: var(--red); }

  /* ── CUSTOM CONFIRM ── */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .confirm-box {
    background: #fff; border-radius: 20px;
    padding: 28px 24px 20px; max-width: 320px; width: 100%;
    text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    animation: modalIn 0.2s ease;
  }
  .confirm-msg {
    font-size: 15px; color: var(--text); line-height: 1.5; margin-bottom: 20px;
  }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn {
    flex: 1; padding: 13px;
    border: none; border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .confirm-btn-ok { background: var(--red); color: #fff; }
  .confirm-btn-ok:hover { background: #c01818; }
  .confirm-btn-cancel { background: #f0f2f5; color: var(--muted); }
  .confirm-btn-cancel:hover { background: #e5e7ea; }
    header { padding: 12px 16px; }
    .main { padding: 20px 16px; }
    .exercise-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .modal-overlay { padding: 16px; align-items: center; }
    .modal-wrap { max-width: 100%; }
    .modal { border-radius: 20px; }
    .remove-btn { display: flex; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="back-btn">← Back</a>
    <div>
      <div class="page-title">My Workout</div>
      <div class="workout-count" id="workout-count"></div>
    </div>
  </div>
  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</header>

<div class="main" id="main"></div>

<!-- Custom Confirm -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-message"></div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">Cancel</button>
      <button class="confirm-btn confirm-btn-ok" id="confirm-ok">Clear</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-wrap">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal">
      <div class="modal-video" id="modal-video"></div>
      <div class="modal-body">
        <div class="modal-title" id="modal-title"></div>
        <div id="modal-meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
const equipLabels = {
  all: 'All', barbell: 'Barbell', dumbbell: 'Dumbbell',
  cable: 'Cable', machine: 'Machine', bodyweight: 'Bodyweight', other: 'Other'
};

let workout = JSON.parse(localStorage.getItem('maximus-workout') || '[]');

function saveWorkout() {
  localStorage.setItem('maximus-workout', JSON.stringify(workout));
}

function render() {
  const main = document.getElementById('main');
  const countEl = document.getElementById('workout-count');

  if (workout.length === 0) {
    countEl.textContent = '0 exercises';
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💪</div>
        <div class="empty-title">Workout is Empty</div>
        <div class="empty-sub">Go back and add exercises from the muscle map</div>
        <a href="index.html" class="go-back-btn">← Browse Exercises</a>
      </div>`;
    return;
  }

  countEl.textContent = workout.length + ' exercise' + (workout.length !== 1 ? 's' : '');

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  // IntersectionObserver for mobile autoplay
  const observer = isTouchDevice ? new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const vid = entry.target.querySelector('video');
      if (!vid) return;
      if (entry.isIntersecting) vid.play().catch(() => {});
      else { vid.pause(); vid.currentTime = 0; }
    });
  }, { threshold: 0.25 }) : null;

  const grid = document.createElement('div');
  grid.className = 'exercise-grid';

  workout.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'ex-card';

    const numBadge = document.createElement('div');
    numBadge.className = 'ex-num';
    numBadge.textContent = i + 1;

    const videoWrap = document.createElement('div');
    videoWrap.className = 'ex-video';
    if (ex.video) {
      const vid = document.createElement('video');
      vid.src = ex.video;
      vid.loop = true; vid.muted = true; vid.playsInline = true; vid.preload = 'metadata';
      if (!isTouchDevice) {
        videoWrap.addEventListener('mouseenter', () => vid.play().catch(() => {}));
        videoWrap.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
      }
      videoWrap.appendChild(vid);
    }

    const info = document.createElement('div');
    info.className = 'ex-info';
    info.innerHTML = `<div class="ex-name">${ex.name}</div><span class="ex-tag">${equipLabels[ex.equip] || ex.equip}</span>`;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '✕ Delete';
    removeBtn.title = 'Remove from workout';
    removeBtn.onclick = (e) => {
      e.stopPropagation();
      workout = workout.filter(w => w.name !== ex.name);
      saveWorkout();
      render();
    };

    card.appendChild(numBadge);
    card.appendChild(videoWrap);
    card.appendChild(info);
    card.appendChild(removeBtn);
    card.addEventListener('click', () => openModal(ex.name, ex.equip, ex.video || ''));
    grid.appendChild(card);

    if (observer) observer.observe(card);
  });

  main.innerHTML = '';
  main.appendChild(grid);
}

function openModal(name, equip, video) {
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-meta').innerHTML = `<span class="ex-tag">${equipLabels[equip] || equip}</span>`;
  const videoEl = document.getElementById('modal-video');
  if (video) {
    videoEl.innerHTML = `<video src="${video}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:contain;background:white;display:block"></video>`;
  } else {
    videoEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ccc;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;">NO VIDEO</div>`;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modal').classList.remove('open');
    const v = document.querySelector('#modal-video video');
    if (v) v.pause();
  }
}

function clearAll() {
  if (workout.length === 0) return;
  showConfirm('Clear all exercises from your workout?', () => {
    workout = [];
    saveWorkout();
    render();
  });
}

function showConfirm(message, onConfirm) {
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('confirm-message').textContent = message;
  overlay.style.display = 'flex';
  document.getElementById('confirm-ok').onclick = () => {
    overlay.style.display = 'none';
    onConfirm();
  };
  document.getElementById('confirm-cancel').onclick = () => {
    overlay.style.display = 'none';
  };
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Populate video URLs from the main EXERCISES data if not stored
// Videos are stored in localStorage when added from index.html
render();
</script>
</body>
</html>
